; PlatformIO alternative to the Makefile — open THIS folder (firmware/leaf) in
; VSCode with the PlatformIO extension; Build/Upload work from the toolbar.
; The Makefile (avr-gcc 14 + pymcuprog) remains the reference build; this file
; produces the same firmware from the same src/.
;
; Board settings that matter, and why:
;   board = ATtiny3226        atmelmegaavr platform, NO framework line — this
;                             is bare-metal C, not Arduino/megaTinyCore code.
;   f_cpu = 5000000UL         informational for the compiler (delays, UART
;                             math). The real clock is set in code: hal.c
;                             prescales the 20 MHz internal osc by 4 at boot.
;                             Do not "fix" this to 20 MHz.
;   upload = pymcuprog        SerialUPDI over any USB-serial adapter
;                             (pip install pymcuprog). Wiring in README.
;
; Fuses: factory defaults are correct (OSCCFG=0x02 → 20 MHz osc). Verify once
; per chip: pymcuprog read -t uart -u <port> -d attiny3226 -m fuses
; Note --erase wipes EEPROM too: OTA-applied config reverts to config.h
; defaults on every reflash (the leaf re-inits + re-burns radio NVRAM itself).

[env:forsyth-leaf]
platform = atmelmegaavr
board = ATtiny3226
board_build.f_cpu = 5000000UL
build_flags = -std=gnu11 -Wall -Wextra
upload_protocol = custom
upload_command = pymcuprog write -t uart -u $UPLOAD_PORT -d attiny3226 --erase --verify -f $SOURCE

; Per-leaf identity without editing config.h:
;   PLATFORMIO_BUILD_FLAGS="-DSTATION_ID_OVERRIDE=2" pio run -t upload
; or add more [env:leaf-N] sections with build_flags = -DSTATION_ID_OVERRIDE=N

[env:leaf-2]
extends = env:forsyth-leaf
build_flags = ${env:forsyth-leaf.build_flags} -DSTATION_ID_OVERRIDE=2
