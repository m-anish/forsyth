# Forsyth MQTT broker. Auth required — no anonymous clients.
# Credentials are created into the mounted passwd volume:
#   docker compose exec mosquitto mosquitto_passwd -c -b /mosquitto/passwd/passwd forsyth-api <password>
#   docker compose exec mosquitto mosquitto_passwd -b /mosquitto/passwd/passwd coordinator-01 <password>
# then: docker compose restart mosquitto
#
# For TLS to the outside world, terminate at the VPS firewall/tunnel or add a
# listener with certs here; the coordinator can also simply use HTTPS ingest.

persistence true
persistence_location /mosquitto/data/

listener 1883
allow_anonymous false
password_file /mosquitto/passwd/passwd
