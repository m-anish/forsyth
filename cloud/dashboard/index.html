<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forsyth · live</title>
  <meta name="description" content="Live readings from the Forsyth weather mesh." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/dash.css?v=2" />
  <link rel="icon" type="image/svg+xml" href="assets/mark.svg" />
  <script src="js/theme.js?v=2"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand"><img src="assets/mark.svg" alt="" aria-hidden="true" />forsyth</a>
    <span class="crumb">/ live</span>
    <span class="right">
      <button class="theme-btn" type="button" aria-label="switch color theme">◐ auto</button>
      <span class="dot"></span><span id="mesh-status">listening</span>
    </span>
  </div>
</header>

<main class="wrap">
  <div class="pagehead">
    <span class="kicker">The mesh, at this moment</span>
    <h1 class="headline">What the sky is doing.</h1>
    <p class="sub" id="mesh-sub">Reading the stations…</p>
  </div>

  <div class="wx-banner" id="wx-banner" role="status">
    <span class="k">Present weather</span>
    <p></p>
  </div>

  <div class="map-panel">
    <div id="map" aria-label="Map of stations"></div>
  </div>

  <div class="cards" id="cards"></div>
</main>

<footer class="sl-footer">
  <div class="wrap">
    <div class="sl-signoff">
      <span>⛅ forsyth / live readings</span>
      <span><a href="https://forsyth.starstucklab.com">about forsyth ↗</a> · <a href="/api/docs">api ↗</a></span>
    </div>
  </div>
</footer>

<script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/common.js?v=2"></script>
<script>
'use strict';

function card(s) {
  const stale = isStale(s.last_seen);
  const a = aqi(s.pm25, s.pm10);
  return `
  <a class="card" href="station.html?slug=${s.slug}">
    <div class="row1">
      <h2>${s.name}</h2>
      ${s.is_simulated ? '<span class="badge sim">rehearsal data</span>' : ''}
      <span class="seen ${stale ? 'stale' : ''}"><span class="led"></span>${agoLabel(s.last_seen)}</span>
    </div>
    <div class="bigtemp">${fmt(s.temp_c, 1)}<span class="u">°C</span></div>
    <div class="conds">${describe(s)}</div>
    <div class="minis">
      <div class="mini"><div class="l">Wind</div><div class="v">${fmt(s.wind_avg_ms,1)} <small>m/s ${dirName(s.wind_dir_deg)}</small></div></div>
      <div class="mini"><div class="l">Pressure</div><div class="v">${s.pressure_pa ? (s.pressure_pa/100).toFixed(1) : '—'} <small>hPa</small></div></div>
      <div class="mini"><div class="l">AQI</div><div class="v">${a ?? '—'} <small>${aqiLabel(a)}</small></div></div>
      <div class="mini"><div class="l">Battery</div><div class="v">${fmt(s.batt_v,2)} <small>V</small></div></div>
    </div>
  </a>`;
}

/* ---------- map ---------- */
let map = null, tiles = null, markers = [];

function tileUrl() {
  const kind = document.documentElement.dataset.theme === 'light' ? 'light_all' : 'dark_all';
  return `https://{s}.basemaps.cartocdn.com/${kind}/{z}/{x}/{y}{r}.png`;
}

function ensureMap(stations) {
  const sited = stations.filter(s => s.lat !== null && s.lon !== null);
  if (!sited.length) { document.querySelector('.map-panel').style.display = 'none'; return; }
  if (!map) {
    map = L.map('map', { scrollWheelZoom: false, attributionControl: true });
    tiles = L.tileLayer(tileUrl(), {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);
    map.fitBounds(sited.map(s => [s.lat, s.lon]), { padding: [50, 50], maxZoom: 13 });
    window.addEventListener('themechange', () => tiles && tiles.setUrl(tileUrl()));
  }
  markers.forEach(m => m.remove());
  markers = sited.map(s => {
    const stale = isStale(s.last_seen);
    const m = L.circleMarker([s.lat, s.lon], {
      radius: 9,
      color: stale ? cssVar('--bad') : cssVar('--accent'),
      fillColor: stale ? cssVar('--bad') : cssVar('--accent'),
      fillOpacity: 0.45, weight: 2,
    }).addTo(map);
    m.bindPopup(`
      <div class="map-pop">
        <h4>${s.name}</h4>
        <div class="l">${fmt(s.temp_c,1)}°C · ${fmt(s.wind_avg_ms,1)} m/s ${dirName(s.wind_dir_deg)} · ${s.pressure_pa ? (s.pressure_pa/100).toFixed(0) : '—'} hPa</div>
        <div class="l">${describe(s)}</div>
        <a href="station.html?slug=${s.slug}">station page →</a>
      </div>`);
    return m;
  });
}

/* ---------- refresh loop ---------- */
async function refresh() {
  try {
    const { stations } = await getJSON('/stations');
    document.getElementById('cards').innerHTML = stations.map(card).join('');
    ensureMap(stations);
    const live = stations.filter(s => !isStale(s.last_seen)).length;
    const simulated = stations.some(s => s.is_simulated);
    document.getElementById('mesh-sub').textContent =
      `${stations.length} station${stations.length === 1 ? '' : 's'}, ${live} reporting.` +
      (simulated ? ' Some of them are rehearsing — the hardware is still on the bench.' : '');
    document.getElementById('mesh-status').textContent =
      live === stations.length ? 'all ears' : `${live}/${stations.length} heard`;
  } catch (e) {
    document.getElementById('mesh-sub').textContent = 'The coordinator is not answering. It happens.';
  }
  refreshBanner();
}
refresh();
setInterval(refresh, 60_000);
</script>
</body>
</html>
