<!DOCTYPE html>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>forsyth · live</title>
  <meta name="description" content="Live readings from the Forsyth weather mesh." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/dash.css?v=23" />
  <link rel="icon" type="image/svg+xml" href="assets/mark.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0c0e" />
  <script src="js/theme.js?v=23"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand"><img src="assets/mark.svg" alt="" aria-hidden="true" />forsyth</a>
    <span class="crumb">/ live</span>
    <span class="right">
      <a href="board.html" class="nav-chip"><span class="hide-sm">my </span>board →</a>
      <button class="theme-btn" type="button" aria-label="switch color theme">◐ auto</button>
      <span class="dot"></span><span id="mesh-status">listening</span>
    </span>
    <button class="nav-menu" type="button" aria-label="menu" aria-expanded="false">☰</button>
  </div>
</header>

<main class="wrap">
  <div class="pagehead pagehead-slim">
    <h1 class="headline">What the sky is doing<span class="mesh-line" id="mesh-sub"> · reading the stations…</span></h1>
  </div>

  <div class="wx-banner" id="wx-banner" role="status">
    <span class="k">Weather</span>
    <p></p>
  </div>

  <div class="map-panel">
    <div id="map" aria-label="Map of stations"></div>
  </div>

  <div class="cards" id="cards"></div>
</main>

<footer class="sl-footer">
  <div class="wrap">
    <div class="sl-signoff">
      <span>⛅ forsyth / live readings</span>
      <span><a href="https://forsyth.starstucklab.com">about forsyth ↗</a> · <a href="/api/docs">api ↗</a> · <a href="privacy.html">privacy</a> · <a href="https://github.com/m-anish/forsyth">github ↗</a></span>
    </div>
  </div>
</footer>

<script src="https://unpkg.com/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/common.js?v=23"></script>
<script src="js/map.js?v=23"></script>
<script src="js/report.js?v=23"></script>
<script>
'use strict';

function card(s) {
  const stale = isStale(s.last_seen);
  const a = aqi(s.pm25, s.pm10);
  return `
  <a class="card" href="station.html?slug=${s.slug}">
    <div class="row1">
      <h2>${s.name}</h2>
      ${s.is_simulated ? '<span class="badge sim">rehearsal data</span>' : ''}
      <span class="seen ${stale ? 'stale' : ''}"><span class="led"></span>${agoLabel(s.last_seen)}</span>
    </div>
    <div class="bigtemp">${fmt(s.temp_c, 1)}<span class="u">°C</span></div>
    <div class="conds">${describe(s)}</div>
    <div class="minis">
      <div class="mini"><div class="l">Wind</div><div class="v">${fmt(s.wind_avg_ms,1)} <small>m/s ${dirName(s.wind_dir_deg)}</small></div></div>
      <div class="mini"><div class="l">Pressure</div><div class="v">${s.pressure_pa ? (s.pressure_pa/100).toFixed(1) : '—'} <small>hPa</small></div></div>
      <div class="mini"><div class="l">AQI</div><div class="v">${a ?? '—'} <small>${aqiLabel(a)}</small></div></div>
      <div class="mini"><div class="l">Battery</div><div class="v">${fmt(s.batt_v,2)} <small>V</small></div></div>
    </div>
  </a>`;
}

/* ---------- map (implementation in js/map.js; roadmap in cloud/docs) ---------- */
let mapHandle = null;

function ensureMap(stations) {
  const sited = stations.filter(s => s.lat !== null && s.lon !== null);
  if (!sited.length) { document.querySelector('.map-panel').style.display = 'none'; return; }
  if (!mapHandle) mapHandle = forsythMap(document.getElementById('map'), stations);
  else mapHandle.update(stations);
}

/* ---------- refresh loop ---------- */
async function refresh() {
  try {
    const { stations } = await getJSON('/stations');
    document.getElementById('cards').innerHTML = stations.map(card).join('');
    ensureMap(stations);
    const live = stations.filter(s => !isStale(s.last_seen)).length;
    const simulated = stations.some(s => s.is_simulated);
    document.getElementById('mesh-sub').textContent =
      ` · ${live}/${stations.length} reporting${simulated ? ' · rehearsing' : ''}`;
    document.getElementById('mesh-status').textContent =
      live === stations.length ? 'all ears' : `${live}/${stations.length} heard`;
  } catch (e) {
    document.getElementById('mesh-sub').textContent = ' · the coordinator is not answering. It happens.';
  }
  refreshBanner();
}
refresh();
setInterval(refresh, 60_000);
Report.mount();
</script>
</body>
</html>
