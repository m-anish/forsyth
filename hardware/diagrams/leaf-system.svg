<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 680" font-family="Menlo, Consolas, monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7fa2c4"/>
    </marker>
    <style>
      .box { fill:#1b2230; stroke:#3d4a5e; stroke-width:1.2; rx:8; }
      .inner { fill:#232c3d; stroke:#4a5a72; stroke-width:1; }
      .zone { fill:none; stroke:#56606e; stroke-width:1.2; stroke-dasharray:6 5; }
      .t { fill:#e8e9e6; font-size:14px; }
      .tb { fill:#e8e9e6; font-size:15px; font-weight:bold; }
      .ts { fill:#9aa3ad; font-size:11.5px; }
      .tk { fill:#b8a06a; font-size:11.5px; letter-spacing:1px; }
      .wire { stroke:#7fa2c4; stroke-width:1.8; fill:none; }
      .lbl { fill:#7fa2c4; font-size:11.5px; }
    </style>
  </defs>

  <text x="30" y="34" class="tb" font-size="19">forsyth · leaf — boards &amp; interconnect</text>
  <text x="30" y="54" class="ts">architecture.md §6 · connector pin-counts are the mis-plug defence</text>

  <!-- masthead zone -->
  <rect x="30" y="80" width="300" height="150" class="zone"/>
  <text x="44" y="102" class="tk">MASTHEAD</text>
  <rect x="50" y="114" width="120" height="40" class="box" rx="8"/>
  <text x="62" y="138" class="t">wind vane</text>
  <rect x="185" y="114" width="125" height="40" class="box" rx="8"/>
  <text x="196" y="138" class="t">anemometer</text>
  <rect x="50" y="168" width="260" height="48" class="box" rx="8"/>
  <text x="62" y="188" class="tb">BOARD D · wind interface</text>
  <text x="62" y="205" class="ts">8-reed ladder + RC debounce · fully passive</text>
  <path class="wire" d="M110 154 L110 168"/>
  <path class="wire" d="M247 154 L247 168"/>

  <!-- screen zone -->
  <rect x="420" y="80" width="330" height="150" class="zone"/>
  <text x="434" y="102" class="tk">STEVENSON SCREEN</text>
  <rect x="440" y="114" width="290" height="58" class="box" rx="8"/>
  <text x="452" y="134" class="tb">BOARD B · environment</text>
  <text x="452" y="151" class="ts">BME280 (pressure) · SHTC3 (T/RH) · AS3935 (⚡ + IRQ)</text>
  <text x="452" y="165" class="ts">passive-quiet — no switching converters up here</text>
  <rect x="440" y="182" width="290" height="34" class="box" rx="8"/>
  <text x="452" y="203" class="t">PMS7003 <tspan class="ts">· particulates, wants the airflow</tspan></text>

  <!-- core box -->
  <rect x="240" y="300" width="560" height="230" class="box" rx="10"/>
  <text x="258" y="326" class="tb">BOARD A · core — sealed box under the screen</text>
  <text x="258" y="343" class="ts">the only board with switchers · every external port lives here, protection row behind each</text>
  <rect x="258" y="358" width="150" height="64" class="inner" rx="6"/>
  <text x="270" y="378" class="t">ATtiny3226</text>
  <text x="270" y="394" class="ts">SOIC-20 · UPDI</text>
  <text x="270" y="408" class="ts">runs off the cell</text>
  <rect x="424" y="358" width="170" height="64" class="inner" rx="6"/>
  <text x="436" y="378" class="t">E22-900Txx</text>
  <text x="436" y="394" class="ts">TPS61023 gated 5 V</text>
  <text x="436" y="408" class="ts">bulk 220 µF at VCC</text>
  <rect x="610" y="358" width="170" height="64" class="inner" rx="6"/>
  <text x="622" y="378" class="t">CN3801 MPPT</text>
  <text x="622" y="394" class="ts">LiFePO4 18650</text>
  <text x="622" y="408" class="ts">holder on-board</text>
  <rect x="258" y="436" width="150" height="52" class="inner" rx="6"/>
  <text x="270" y="456" class="t">PMS rail</text>
  <text x="270" y="472" class="ts">TPS61023 · gated</text>
  <rect x="424" y="436" width="170" height="52" class="inner" rx="6"/>
  <text x="436" y="456" class="t">protection row</text>
  <text x="436" y="472" class="ts">TVS + series R + rev-pol</text>
  <rect x="610" y="436" width="170" height="52" class="inner" rx="6"/>
  <text x="622" y="456" class="t">Qwiic expansion</text>
  <text x="622" y="472" class="ts">3V3 · GND · SDA · SCL</text>
  <path class="wire" d="M780 390 L840 390" marker-end="url(#arr)"/>
  <text x="792" y="380" class="lbl">antenna</text>

  <!-- external items -->
  <rect x="60" y="580" width="150" height="46" class="box" rx="8"/>
  <text x="74" y="600" class="t">☀ solar panel</text>
  <text x="74" y="616" class="ts">1–2 W · 5–6 V</text>
  <rect x="300" y="580" width="160" height="46" class="box" rx="8"/>
  <text x="314" y="600" class="t">🌧 rain gauge</text>
  <text x="314" y="616" class="ts">reed + magnet, dumb</text>

  <!-- coordinator hint -->
  <rect x="860" y="330" width="170" height="120" class="box" rx="8" stroke-dasharray="5 4"/>
  <text x="874" y="354" class="tb">coordinator</text>
  <text x="874" y="372" class="ts">ESP32-S3 · DS3231</text>
  <text x="874" y="388" class="ts">same E22 + gating</text>
  <text x="874" y="404" class="ts">WiFi → dashboard</text>
  <text x="874" y="420" class="ts">+ Weather Underground</text>
  <path class="wire" stroke-dasharray="4 5" d="M845 392 Q852 380 860 388"/>
  <text x="812" y="424" class="lbl">LoRa</text>

  <!-- interconnect wires -->
  <path class="wire" d="M180 216 L180 268 Q180 282 194 282 L330 282 Q344 282 346 296 L348 300" marker-end="url(#arr)"/>
  <text x="196" y="262" class="lbl">GX16-5 · shielded 5-core down the mast</text>
  <text x="196" y="276" class="lbl">3V3 · GND · vane · anemo · shield</text>

  <path class="wire" d="M440 158 L404 158 L404 284 Q404 296 418 298 L430 300" marker-end="url(#arr)"/>
  <text x="412" y="248" class="lbl" text-anchor="end">JST-XH-5</text>
  <text x="412" y="262" class="lbl" text-anchor="end">3V3 GND SDA SCL IRQ</text>

  <path class="wire" d="M700 216 L700 250 L650 300" marker-end="url(#arr)"/>
  <text x="712" y="262" class="lbl">JST-XH-4 · 5V GND TXD RXD</text>

  <path class="wire" d="M135 580 L135 552 Q135 540 149 540 L300 540 Q314 540 316 532 L320 530" marker-end="url(#arr)"/>
  <text x="150" y="560" class="lbl">GX12-2 · panel + −</text>

  <path class="wire" d="M380 580 L380 556 L400 530" marker-end="url(#arr)"/>
  <text x="392" y="566" class="lbl">GX12-3 · pulse GND shield</text>
</svg>
